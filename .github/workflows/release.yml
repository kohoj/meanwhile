name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify the tag matches package.json
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(bun --print 'require("./package.json").version')"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi
          echo "Releasing $pkg"

      - run: bun install --frozen-lockfile

      # The full gate must pass before anything is published; a tag is never a
      # substitute for verified evidence.
      - run: bun run check

      # npm blocks dependency install scripts by default and the runner is
      # compiled on first use, so publishing the sources alone is correct — the
      # same path exercised in bun run check.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
