services:
  meanwhile:
    build: .
    init: true
    restart: unless-stopped
    env_file:
      - path: ${MEANWHILE_ENV_FILE:-./compose.env}
        required: false
    environment:
      MEANWHILE_HOST: 0.0.0.0
      MEANWHILE_PORT: 7331
      MEANWHILE_PREVIEW_HOST: 0.0.0.0
      MEANWHILE_PREVIEW_PORT: 7332
      MEANWHILE_PREVIEW_PUBLIC_URL: "${MEANWHILE_PREVIEW_PUBLIC_URL:-http://127.0.0.1:7332}"
      MEANWHILE_DATA_DIR: /data/state
      MEANWHILE_LOCAL_PROVIDER: "${MEANWHILE_LOCAL_PROVIDER:-enabled}"
      MEANWHILE_ALLOW_UNSAFE_LOCAL_PROVIDER: "${MEANWHILE_ALLOW_UNSAFE_LOCAL_PROVIDER:-true}"
      MEANWHILE_API_KEY: ${MEANWHILE_API_KEY:?set MEANWHILE_API_KEY}
    ports:
      - "127.0.0.1:${MEANWHILE_CONTROL_PLANE_HOST_PORT:-7331}:7331"
      - "127.0.0.1:${MEANWHILE_PREVIEW_HOST_PORT:-7332}:7332"
    volumes:
      - meanwhile-data:/data
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:7331/readyz').then(r=>{if(!r.ok)throw new Error(String(r.status))})
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  project-watch:
    build: .
    init: true
    restart: unless-stopped
    depends_on:
      meanwhile:
        condition: service_healthy
    command: ["bun", "board/src/main.ts"]
    environment:
      MEANWHILE_URL: http://meanwhile:7331
      MEANWHILE_BOARD_HOST: 0.0.0.0
      MEANWHILE_BOARD_PORT: 7333
    ports:
      - "127.0.0.1:${MEANWHILE_BOARD_HOST_PORT:-7333}:7333"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:7333/').then(r=>{if(!r.ok)throw new Error(String(r.status))})
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

volumes:
  meanwhile-data:
